name: wasivst build

on:
  push:
    branches: ['**']
    tags: ['*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-host:
    name: Build wasivst-host
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build mingw-w64

      - name: Build wasivst-host (Windows PE via mingw-w64)
        run: |
          meson setup build --buildtype=release -Dvst3=false --cross-file cross-mingw.ini
          ninja -C build wasivst-host.exe

      - name: Upload wasivst-host artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasivst-host
          path: build/wasivst-host.exe

  build-guest-rootfs:
    name: Build Linux guest rootfs
    runs-on: ubuntu-22.04
    needs: [build-host]
    steps:
      - uses: actions/checkout@v4

      - name: Download wasivst-host artifact
        uses: actions/download-artifact@v4
        with:
          name: wasivst-host
          path: src/guest/

      - name: Rename artifact for Dockerfile COPY
        run: mv src/guest/wasivst-host.exe src/guest/wasivst-host-placeholder.exe

      - name: Build rootfs via Docker
        run: |
          docker build -f src/guest/Dockerfile -t wasivst-guest src/guest/
          docker create --name tmp wasivst-guest /null
          docker cp tmp:/rootfs.ext4 rootfs.ext4
          docker rm tmp

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: rootfs.ext4

  build-qemu-wasm:
    name: Build QEMU WASM bundle
    runs-on: ubuntu-22.04
    needs: [build-guest-rootfs]
    steps:
      - uses: actions/checkout@v4

      - name: Download rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs

      - name: Fetch v86 WASM emulator and bundle rootfs
        run: |
          mkdir -p /tmp/v86-extract
          npm pack v86 --pack-destination /tmp/v86-pack
          tar -xzf /tmp/v86-pack/*.tgz -C /tmp/v86-extract --strip-components=1
          mkdir -p dist
          cp /tmp/v86-extract/build/v86.wasm dist/wasivst-qemu.wasm
          cp /tmp/v86-extract/build/libv86.js dist/libv86.js
          cp rootfs.ext4 dist/rootfs.ext4

      - name: Upload QEMU WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-wasm
          path: dist/

  bundle-and-publish:
    name: Bundle JS + WASM and publish
    runs-on: ubuntu-22.04
    needs: [build-qemu-wasm]
    steps:
      - uses: actions/checkout@v4

      - name: Download QEMU WASM
        uses: actions/download-artifact@v4
        with:
          name: qemu-wasm
          path: dist/

      - name: Copy worklet JS
        run: |
          cp src/worklet/wasivst.js dist/wasivst.js
          cp src/worklet/wasivst-worklet.js dist/wasivst-worklet.js
          printf '<!doctype html><html><body></body></html>' > dist/index.html

      - name: Install dev dependencies
        run: npm install

      - name: Smoke test (headless Chrome)
        run: |
          npx playwright install chromium
          node src/worklet/smoke-test.mjs

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo '//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}' > ~/.npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy GitHub Pages demo
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy Pages
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/deploy-pages@v4

  smoke-test:
    name: Smoke test in browser
    runs-on: ubuntu-22.04
    needs: [bundle-and-publish]
    steps:
      - uses: actions/checkout@v4
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: qemu-wasm
          path: dist/
      - name: Install dev dependencies
        run: npm install
      - run: |
          cp src/worklet/wasivst.js dist/
          cp src/worklet/wasivst-worklet.js dist/
          printf '<!doctype html><html><body></body></html>' > dist/index.html
          npx playwright install chromium
          node src/worklet/smoke-test.mjs
