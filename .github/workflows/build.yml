name: wasivst build

on:
  push:
    branches: ['**']
    tags: ['*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-host:
    name: Build wasivst-host
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build mingw-w64

      - name: Build wasivst-host (Windows PE via mingw-w64)
        run: |
          meson setup build --buildtype=release -Dvst3=false --cross-file cross-mingw.ini
          ninja -C build wasivst-host.exe

      - name: Upload wasivst-host artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasivst-host
          path: build/wasivst-host.exe

  build-guest-rootfs:
    name: Build Linux guest rootfs
    runs-on: ubuntu-22.04
    needs: [build-host]
    steps:
      - uses: actions/checkout@v4

      - name: Download wasivst-host artifact
        uses: actions/download-artifact@v4
        with:
          name: wasivst-host
          path: src/guest/

      - name: Rename artifact for Dockerfile COPY
        run: mv src/guest/wasivst-host.exe src/guest/wasivst-host-placeholder.exe

      - name: Build rootfs via Docker
        run: |
          docker build -f src/guest/Dockerfile -t wasivst-guest src/guest/
          docker create --name tmp wasivst-guest /null
          docker cp tmp:/rootfs.ext4 rootfs.ext4
          docker rm tmp

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: rootfs.ext4

  build-qemu-wasm:
    name: Build QEMU WASM bundle
    runs-on: ubuntu-22.04
    needs: [build-guest-rootfs]
    steps:
      - uses: actions/checkout@v4

      - name: Download rootfs
        uses: actions/download-artifact@v4
        with:
          name: rootfs

      - name: Fetch v86 WASM emulator and bundle rootfs
        run: |
          mkdir -p /tmp/v86-extract /tmp/v86-pack
          npm pack v86 --pack-destination /tmp/v86-pack
          tar -xzf /tmp/v86-pack/*.tgz -C /tmp/v86-extract --strip-components=1
          mkdir -p dist
          cp /tmp/v86-extract/build/v86.wasm dist/wasivst-qemu.wasm
          cp /tmp/v86-extract/build/libv86.mjs dist/libv86.mjs
          cp rootfs.ext4 dist/rootfs.ext4

      - name: Split rootfs into 50MB parts for GitHub Pages
        run: |
          cd dist
          split -b 50m rootfs.ext4 rootfs.ext4.part-
          python3 -c "
          import os, json
          parts = sorted(f for f in os.listdir('.') if f.startswith('rootfs.ext4.part-'))
          print(json.dumps(parts))
          " > rootfs.parts.json
          rm rootfs.ext4

      - name: Upload QEMU WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-wasm
          path: dist/

  bundle-and-publish:
    name: Bundle JS + WASM and publish
    runs-on: ubuntu-22.04
    needs: [build-qemu-wasm]
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Download QEMU WASM
        uses: actions/download-artifact@v4
        with:
          name: qemu-wasm
          path: dist/

      - name: Copy worklet JS and build demo
        run: |
          cp src/worklet/wasivst.js dist/wasivst.js
          cp src/demo/coi-serviceworker.js dist/coi-serviceworker.js
          cp src/demo/index.html dist/index.html
          # Bundle libv86.mjs into wasivst-worklet.js as a single self-contained
          # classic script. AudioWorklet static imports fail silently in Chrome
          # when the imported module uses APIs unavailable in worklet scope.
          # Strip ES module export lines from libv86.mjs, then append the
          # worklet body (minus its import line) to produce one bundled file.
          node -e "
            const fs = require('fs');
            const lib = fs.readFileSync('dist/libv86.mjs', 'utf8')
              .replace(/^export\s*\{[^}]*\};?/gm, '')
              .replace(/^export\s+default\s+[^;]+;/gm, '')
              .replace(/^export\s+let\s+\{[^}]+\}\s*=[^;]+;/gm, '');
            const worklet = fs.readFileSync('src/worklet/wasivst-worklet.js', 'utf8')
              .replace(/^import\s+\{[^}]+\}\s+from\s+'[^']+';?\s*\n/m, '');
            fs.writeFileSync('dist/wasivst-worklet.js', lib + '\n' + worklet);
            console.log('Bundled wasivst-worklet.js:', fs.statSync('dist/wasivst-worklet.js').size, 'bytes');
          "

      - name: Bundle Dexed VST3 (64-bit) for demo
        run: |
          curl -L -o /tmp/dexed-win.zip https://github.com/asb2m10/dexed/releases/download/v1.0.1/Dexed-1.0.1-win.zip
          mkdir -p /tmp/dexed
          unzip -o /tmp/dexed-win.zip -d /tmp/dexed
          cp "/tmp/dexed/Dexed.vst3/Contents/x86_64-win/Dexed.vst3" dist/Dexed.vst3.dll
          test -f dist/Dexed.vst3.dll || (echo "Dexed.vst3 not found" && find /tmp/dexed -type f && exit 1)

      - name: Install dev dependencies
        run: npm install

      - name: Smoke test (headless Chrome)
        run: |
          npx playwright install chromium
          node src/worklet/smoke-test.mjs

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo '//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}' > ~/.npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy GitHub Pages demo
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy Pages
        if: github.ref == 'refs/heads/main'
        id: deploy
        uses: actions/deploy-pages@v4

  vst-integration-test:
    name: VST integration test (Surge XT)
    runs-on: ubuntu-22.04
    needs: [build-qemu-wasm]
    steps:
      - uses: actions/checkout@v4
      - name: Download QEMU WASM
        uses: actions/download-artifact@v4
        with:
          name: qemu-wasm
          path: dist/
      - name: Copy worklet JS
        run: |
          cp src/worklet/wasivst.js dist/wasivst.js
          printf '<!doctype html><html><body></body></html>' > dist/index.html
          node -e "
            const fs = require('fs');
            const lib = fs.readFileSync('dist/libv86.mjs', 'utf8')
              .replace(/^export\s*\{[^}]*\};?/gm, '')
              .replace(/^export\s+default\s+[^;]+;/gm, '')
              .replace(/^export\s+let\s+\{[^}]+\}\s*=[^;]+;/gm, '');
            const worklet = fs.readFileSync('src/worklet/wasivst-worklet.js', 'utf8')
              .replace(/^import\s+\{[^}]+\}\s+from\s+'[^']+';?\s*\n/m, '');
            fs.writeFileSync('dist/wasivst-worklet.js', lib + '\n' + worklet);
          "
      - name: Download Surge XT VST3 (Windows 64-bit, pluginsonly zip)
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/surge-synthesizer/surge/releases/tags/Nightly \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print(next(a['browser_download_url'] for a in assets if 'win64' in a['name'] and 'pluginsonly' in a['name'] and 'arm' not in a['name'] and 'juce7' not in a['name']))")
          curl -L -o /tmp/surge-pluginsonly.zip "$ASSET_URL"
          mkdir -p /tmp/surge
          unzip -o /tmp/surge-pluginsonly.zip -d /tmp/surge
          find /tmp/surge/Surge\ XT.vst3/Contents/x86_64-win -type f | head -1 | xargs -I{} cp {} dist/SurgeXT.dll
          test -f dist/SurgeXT.dll || (echo "SurgeXT.dll not found" && find /tmp/surge -type f | head -30 && exit 1)
      - name: Install dev dependencies
        run: npm install
      - name: Run VST integration test (headless Chrome)
        run: |
          npx playwright install chromium
          node src/worklet/vst-integration-test.mjs
